name: Deploy Static Site to Firebase Hosting

on:
  push:
    branches:
      - main            # Automatically deploys when you merge/push to main
  release:
    types:
      - published       # Automatically deploys on production release tagging
  workflow_dispatch:    # Allows manual deployments directly from the GitHub UI

# Production-grade permissions (Principle of Least Privilege)
permissions:
  contents: read        # Securely read your HTML/CSS files
  deployments: write    # Required to post deployment status back to GitHub

jobs:
  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-latest
    
    # Prevents race conditions from multiple simultaneous merges
    concurrency:
      group: firebase-static-prod
      cancel-in-progress: false

    steps:
      # 1. Checkout your HTML, CSS, and JS files (Upgraded to stable v4)
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Directly deploy static files to Firebase (No compilation required)
      - name: Deploy to Firebase Hosting Live Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GLACARE_WEBSITE }}
          channelId: live
          projectId: glacare-website

